<section
  id="faq"
  class="faq section-elevate section-elevate--delay2"
  aria-labelledby="faq-title"
>
  <div class="faq__wrap">
    <header class="faq__intro">
      <h2 id="faq-title">{{ 'faq.title' | translate }}</h2>
      <p>
        {{ 'faq.intro' | translate }}
      </p>
    </header>

    <div class="faq__list" role="list">
      @for (id of faqIds; track id) {
        <div class="faq__item" role="listitem" [class.faq__item--open]="isOpen(id)">
          <button
            type="button"
            class="faq__q"
            [attr.id]="'faq-btn-' + id"
            [attr.aria-expanded]="isOpen(id) ? 'true' : 'false'"
            [attr.aria-controls]="'faq-panel-' + id"
            (click)="toggle(id)"
          >
            <span class="faq__q-text">{{ faqQuestionKey(id) | translate }}</span>
            <span class="faq__icon" aria-hidden="true"></span>
          </button>
          <div
            class="faq__panel"
            role="region"
            [attr.id]="'faq-panel-' + id"
            [attr.aria-labelledby]="'faq-btn-' + id"
          >
            <div class="faq__panel-inner">
              <p class="faq__a">{{ faqAnswerKey(id) | translate }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
