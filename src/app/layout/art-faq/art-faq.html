<section
  id="faq"
  class="faq section-elevate section-elevate--delay2"
  aria-labelledby="faq-title"
>
  <div class="faq__wrap">
    <header class="faq__intro">
      <h2 id="faq-title">Frequently asked questions</h2>
      <p>
        Answers about custom pieces, dolls, materials, delivery, and how to collect original work by
        Georgian artist Ana Kajaia — in the spirit of Anart Gallery.
      </p>
    </header>

    <div class="faq__list" role="list">
      @for (item of items; track item.id) {
        <div class="faq__item" role="listitem" [class.faq__item--open]="isOpen(item.id)">
          <button
            type="button"
            class="faq__q"
            [attr.id]="'faq-btn-' + item.id"
            [attr.aria-expanded]="isOpen(item.id) ? 'true' : 'false'"
            [attr.aria-controls]="'faq-panel-' + item.id"
            (click)="toggle(item.id)"
          >
            <span class="faq__q-text">{{ item.question }}</span>
            <span class="faq__icon" aria-hidden="true"></span>
          </button>
          <div
            class="faq__panel"
            role="region"
            [attr.id]="'faq-panel-' + item.id"
            [attr.aria-labelledby]="'faq-btn-' + item.id"
          >
            <div class="faq__panel-inner">
              <p class="faq__a">{{ item.answer }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
